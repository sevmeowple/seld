# ResNet-Conformer-DHOOM Dynamic Chunk - Streaming Test (chunk=25)
# 对应训练配置: train_resnet_conformer_dhoom_dynamic_chunk.toml
# 测试时使用固定 chunk=24 (chunk_size=25)

exp_name = "resnet_conformer_dhoom_dynamic_chunk_streaming_chunk24"

[model]
name = "resnet_conformer_dhoom"
in_channel = 7
in_dim = 64
out_dim = 39
att_context_size = [100, 24]       # chunk_size = 25
use_dynamic_chunk = true
num_conformer_layers = 8
encoder_dim = 256
num_mhsa = 0
pre_train = true
pre_train_model = "experiments/20260303_181300_resnet_conformer_dhoom_dynamic_chunk/checkpoints/checkpoint_epoch50_step27300.pth"

[data]
wav_folder_path = "/disk7/zchan/Dataset/Dcase2023/dev/foa_dev_test"
ref_files_dir = "/disk7/zchan/Dataset/Dcase2023/dev/ref_files"
norm_file = "/disk7/zchan/Dataset/Dcase2023/dev/norm_dir/24h_ACS_foa_wts_fromlmdb"
batch_size = 1

[streaming]
mode = "streaming"
segment_length_sec = 10.0
hop_length_sec = 10.0
overlap_fusion = false
latency_ms = 0

debug = false
