# ResNet-Conformer-DHOOM Fixed Chunk (chunk=5) - Streaming Test
# 对应训练配置: train_resnet_conformer_dhoom_fixed_chunk.toml

exp_name = "resnet_conformer_dhoom_fixed_chunk_5_streaming"

[model]
name = "resnet_conformer_dhoom"
in_channel = 7
in_dim = 64
out_dim = 39
att_context_size = [100, 4]        # chunk_size = 5
use_dynamic_chunk = false
num_conformer_layers = 8
encoder_dim = 256
num_mhsa = 0
pre_train = true
# 请修改为实际训练好的模型路径
pre_train_model = "experiments/20260303_181100_resnet_conformer_dhoom_fixed_chunk_5/checkpoints/checkpoint_epoch88_step48048.pth"

[data]
wav_folder_path = "/disk7/zchan/Dataset/Dcase2023/dev/foa_dev_test"
ref_files_dir = "/disk7/zchan/Dataset/Dcase2023/dev/ref_files"
norm_file = "/disk7/zchan/Dataset/Dcase2023/dev/norm_dir/24h_ACS_foa_wts_fromlmdb"
batch_size = 1

[streaming]
mode = "streaming"
segment_length_sec = 10.0
hop_length_sec = 10.0
overlap_fusion = false
latency_ms = 0

debug = false
